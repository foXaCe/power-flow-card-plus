version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    groups:
      babel:
        patterns:
          - "@babel/*"
      rollup:
        patterns:
          - "@rollup/*"
          - "rollup*"
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
      semantic-release:
        patterns:
          - "@semantic-release/*"
          - "semantic-release*"
      lit:
        patterns:
          - "lit*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps):"
