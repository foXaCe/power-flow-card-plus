name: Stale

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,help wanted,enhancement"
          exempt-pr-labels: "pinned,security,dependencies"
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            if no further activity occurs. Remove the `stale` label or comment to keep it open.
          stale-pr-message: >
            This pull request has been inactive for 60 days. It will be closed in 14 days
            if no further activity occurs.
          close-issue-message: >
            This issue was closed automatically due to inactivity. Feel free to reopen it if needed.
          close-pr-message: >
            This pull request was closed automatically due to inactivity. Feel free to reopen it if needed.
