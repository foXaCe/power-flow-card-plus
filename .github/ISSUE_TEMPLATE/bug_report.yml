name: Bug Report
description: Report a bug in Power Flow Card Plus
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please provide as much detail as possible.
  - type: input
    id: card-version
    attributes:
      label: Card version
      description: Shown in HACS, or in the browser console when the card loads.
      placeholder: e.g. 0.44.1
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.6.0
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
        - Other
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser / client
      options:
        - Chrome / Chromium
        - Firefox
        - Safari
        - Edge
        - Companion App (Android)
        - Companion App (iOS)
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happens, and what did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: card-config
    attributes:
      label: Card configuration (YAML)
      description: Paste the card's YAML config. Redact sensitive entity names if needed.
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Browser console errors
      description: Open the browser dev tools (F12) → Console, and paste relevant errors.
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
