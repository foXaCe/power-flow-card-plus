allowBuilds:
  unrs-resolver: true

# pnpm 11 active par défaut une policy "minimum release age" qui rejette à
# l'install les versions publiées trop récemment (protection anti supply-chain).
# Sur ce repo géré par Renovate, elle casse l'install à chaque bump récent
# (ex. lint-staged fraîchement publié). On la désactive ici : le contrôle des
# mises à jour reste assuré par Renovate + la review des PR, et les pins de
# sécurité ci-dessous restent en place. Pour réactiver la protection, préférer
# `minimumReleaseAge` côté renovate.json plutôt que de bloquer l'install.
minimumReleaseAge: 0

overrides:
  handlebars: ^4.7.9
  "minimatch@<3.1.3": ^10.0.0
  "minimatch@>=5.0.0 <5.1.8": ^10.0.0
  "brace-expansion@<1.1.13": ^5.0.0
  "brace-expansion@>=2.0.0 <2.0.3": ^5.0.0
  flatted: ^3.4.2
  js-yaml: ^5.0.0
  lodash: ^4.18.1
  lodash-es: ^4.18.1
  picomatch: ^4.0.0
  undici: ^8.0.0
  yaml: ^2.8.3
  serialize-javascript: ^7.0.5
  "@babel/plugin-transform-modules-systemjs": ^8.0.0

peerDependencyRules:
  allowedVersions:
    "@open-wc/eslint-config>eslint": "10"
